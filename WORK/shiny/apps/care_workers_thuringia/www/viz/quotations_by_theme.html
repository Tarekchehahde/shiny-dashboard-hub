  <script>
    const data = {"Transnational Recruitment": [{"interview": "LEG", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "And this is especially a highly complex process in connection with foreign embassies, German schools, Goethe Institutes, and so on. Everything has to be coordinated properly. But we work very well together on that, and then they come here and complete four months—"}, {"interview": "LEG", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "Well, there are people at GPS who travel abroad and have very good contacts with the Goethe-Institutes—the embassies—(Interviewee 2) —the embassies. Through the embassies, they get in touch with German schools abroad. They go into those German schools and present the GPS program. They also present the GPS program at technical colleges, and then we receive applications."}, {"interview": "LEG", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "Yes, yes, he’s a German—a former German—well, he still has a German passport, but he also has a Mexican passport. He’s lived in Monterrey for 30 years and we recruited him. He runs a regional office; he has always placed skilled workers in Europe, but now he does it exclusively for us, so to speak. He has familiarized himself with the GPS program, knows how we tick, how the recruitment needs to work, and what information he needs to provide. He handles those interviews, regular info sessions, follow-ups, and on-site consultations for the new Latin American learners."}, {"interview": "LEG", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "He is based in Monterrey and he also flies to the rural areas. That is to say, if there are enough people there seeking an interview, he does it via in-person events because that conveys so much more. Otherwise, he does a lot online, but he manages it all from Monterrey."}, {"interview": "LEG", "code": "C05", "codeName": "Presence in partnering countries", "quote": "Well, we have a—a regional office in Mexico."}, {"interview": "AWO AJS", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "For example, we have joint activities with our subsidiary, IBS. So there, the project ISGT."}, {"interview": "AWO AJS", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "Besides that, in principle, we have the APAL project for acquiring Mexican trainees, who will then also prospectively complete the training to become a nursing specialist"}, {"interview": "AWO AJS", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "And besides that, we have a cooperation with a company, \"German Competence Academy,\" where we, in principle, have a cooperation agreement between the Free State of Thuringia and the German Competence Academy with the University in Da Nang, where we have a unique selling point in acquiring skilled workers"}, {"interview": "AWO AJS", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "We found a partner there in India, because one cannot really operate there alone in principle, one requires an on-site recruiter for fair recruitment, and with this partner we will, in principle, recruit trained nursing professionals"}, {"interview": "AWO AJS", "code": "C05", "codeName": "Presence in partnering countries", "quote": "we have of course developed certain digital appointments, or we are, for example, once a year in Vietnam, where we then also conduct conversations"}, {"interview": "IBS (Nov)", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "That means we have a partner in Vietnam, the Goethe-Institut. And together with them we do information events and they also disseminate our information when we have free positions."}, {"interview": "IBS (Nov)", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "So in India we want to include next year, and in India we only want to recruit skilled workers, no trainees. And there you have to work with a state-accredited recruiter. And the list of state-accredited recruiters is about 37 pages long from the Indian government. So That is, I mean, you can't look into all of them. We found two now who also already work with the AHK, for example, with whom we also made contact, and with whom it would surely work, but there we have to see how communication works"}, {"interview": "IBS (Nov)", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "We first give all information from our side. So the people usually contact us via email or we get the contact forwarded from our partners in Vietnam. And then they get all the info again. So we always have a little presentation. So we tell them again who we are, we are transparent again about how we are financed. That there are no costs for the people, for example."}, {"interview": "IBS (Nov)", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "And we have a more regulated procedure there, because we don't have scattered interviews like in regular recruitment, but rather these interview days in Hanoi. So we had a recruitment phase beforehand of about three months. We then gave people appointments for the interviews. That was about 55 interviews or so in the end. We had three days in Hanoi, where we conducted interviews on site with an interpreter."}, {"interview": "IBS (Nov)", "code": "C02", "codeName": "Participation in workers recruitment", "quote": "Last year we did it so that we had info events and then always set a deadline for when they should contact us. But our deadlines are a bit flexible; we first give orientation, but if someone contacts us later and we see we still have capacity, we still accept the person."}, {"interview": "IBS (Nov)", "code": "C05", "codeName": "Presence in partnering countries", "quote": "And we have a more regulated procedure there, because we don't have scattered interviews like in regular recruitment, but rather these interview days in Hanoi. So we had a recruitment phase beforehand of about three months. We then gave people appointments for the interviews. That was about 55 interviews or so in the end. We had three days in Hanoi, where we conducted interviews on site with an interpreter."}, {"interview": "IBS (Nov)", "code": "C05", "codeName": "Presence in partnering countries", "quote": "Last year in April we had the first. Delegation trip, we were a very large group and we had many appointments with language schools. Or colleges, and in November last year we had already built up this program and conducted the interviews, but also had appointments with two or three language schools. At our end, many language schools from Vietnam also contact us wanting to cooperate with us."}, {"interview": "IBS (Nov)", "code": "C05", "codeName": "Presence in partnering countries", "quote": "Apparently Vietnam is also known for having a good connection with Thuringia somehow. And here in the house there was also someone. So we, many migration projects or without migration projects, and there was a person who said she Has contacts there or said it will work well in Vietnam, so there was simply a recommendation."}, {"interview": "IBS (Nov)", "code": "C13", "codeName": "Report of uncooperative partners", "quote": "Then Bosnia, I think after about a year, so when we weren't working yet, was replaced by Vietnam, because they only say that Bosnia wasn't going so well."}, {"interview": "IBS (Nov)", "code": "C13", "codeName": "Report of uncooperative partners", "quote": "From the Philippines we had bureaucratic problems...So that's why we had to decide not to include the country further in recruitment, because from the Philippine side documents are required for the people's departure. As a protection for their own population.\nSo that's the reason why the Philippine authorities do that, to combat human trafficking and such. Which is absolutely legitimate. But the way to get these documents is so abnormally complicated and difficult.\nThat it's not feasible for us as a project, right...And for that reason we decided, as I said, to take the Philippines out, because it simply wasn't feasible, neither time-wise nor financially for us."}, {"interview": "IBS (Nov)", "code": "C13", "codeName": "Report of uncooperative partners", "quote": "With Serbia it was more the problem of finding partners at all, who were interested in working with us. Because most language schools also said we have so many people contacting us every day and Here wanting to recruit people from Serbia or Bosnia and everyone is already leaving from these countries anyway, please let them stay here. And then it was somehow difficult because it's also not really wanted by the government anymore, especially in Bosnia, I think. In Vietnam, for example, it's still supported by the government. But in Bosnia it's not wanted anymore because so many people are leaving. And then we of course don't want to press and break, somehow poach people, that's not the goal of our project"}, {"interview": "Diako", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "Both with the trainees and then again in our own round with the other providers from Thuringia, together with ZAV, Goethe-Institut, and LEG in Erfurt—that was the Thuringian Agency for Skilled Worker Acquisition."}, {"interview": "Diako", "code": "C01", "codeName": "Cooperation with external agencies", "quote": "Currently, we are in the project APAL- from ZAV and the Goethe-Institut"}, {"interview": "Diako", "code": "C05", "codeName": "Presence in partnering countries", "quote": "And in the projects for both El Salvador and Mexico, it was such that we said we'll participate, and then we introduced ourselves. For example, for Mexico we created a funny video with our trainees from El Salvador who are already here. We translated it into Spanish, and it was very well received."}, {"interview": "Diako", "code": "C13", "codeName": "Report of uncooperative partners", "quote": "We also got employees from Eastern European countries, Romania, so skilled workers that we can first only employ auxiliary staff. They first have to get their recognition and we participated, or rather we recruited some through a company, and it completely failed, so they all travelled back."}], "Worker Suitability": [{"interview": "LEG", "code": "C03", "codeName": "Age of workers", "quote": "Yes, there is a guideline—18 to 35 years old."}, {"interview": "LEG", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "You also have people who have just arrived from Ukraine—they naturally want to do the profession they had in Ukraine, which is not always feasible"}, {"interview": "LEG", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "Let’s take this simple example: crane operator. Yeah, you think, crane operator—you climb the mast, grab the thing, and then swing it around, and voilà, crane operator. You might think it only takes 14 days to be trained."}, {"interview": "LEG", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "Or if someone comes from Bolivia and says, “I spent two years building cars with my uncle,” that’s great. But that’s why they are not a certified automotive mechatronics technician with us.\nAnd this whole way of thinking—why do you Germans make it so complicated? Why do we have to learn so much before we can do it? We could just do it straight away. That’s difficult."}, {"interview": "LEG", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "We don’t have that anymore in the current cohort, because we’ve already paid attention to it. We have a target group that we serve, so that—"}, {"interview": "LEG", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "In the second cohort, right, I know that in the first cohort there were still people who were doctors, for example. You could talk about that."}, {"interview": "LEG", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "So they had medical practices, for several years—in Mexico, Ecuador, Guatemala. They came here with the understanding that they couldn’t practice as doctors immediately, because they first have to get their medical license in Germany. So they would work in some clinical or nursing area while simultaneously re-qualifying to regain their medical license.\nFour doctors from the first cohort did this. We’ve avoided this in later cohorts, because that step back is quite significant, right? But their main motivation was clear—they saw better career opportunities in Germany, even if they have to start again with vocational training."}, {"interview": "AWO AJS", "code": "C03", "codeName": "Age of workers", "quote": "And of course, it's important to understand the country of origin and to prepare and live a good welcome culture when the young people take this big step over many kilometers from their homeland to their new home, so to speak"}, {"interview": "AWO AJS", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "Because experience has shown that entering with B1 or lower makes it too difficult for the young person during the intensive and challenging generalist training to become a nursing specialist"}, {"interview": "AWO AJS", "code": "C09", "codeName": "Gender of workers", "quote": "In the Indian area 85/90%, so high in the Indian area. In the Vietnamese area, almost equal I would say, 60% women, 40% men, so almost parity there. And in the Mexican area similar, one really has to say"}, {"interview": "AWO AJS", "code": "C09", "codeName": "Gender of workers", "quote": "If I now look at the three countries, except in the Indian one, there it really is more women than men, and that is also the case in Germany, that the social professions are also very female-dominated. But in the other two countries, the scale is balanced."}, {"interview": "IBS (Nov)", "code": "C09", "codeName": "Gender of workers", "quote": "Our classes are actually very mixed. So with the current language qualification class, we have, I think, eleven women and eight men? Something like that, so pretty balanced. And in the regular recruitment, I think we have more women. But it's not like only women."}, {"interview": "IBS (Jan)", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "This process takes very long to check the documents and certificates. It takes very long, sometimes a couple of months, and we have participants that wait for years... I started working at IBS two years ago, and one person started the recognition process with me, and he's still not finished...He works at a bistro, I think, and he can work as an assistant in nursing. So you can work in nursing homes as an assistant, or at this ambulance service, yeah, they can do that, but only as an assistant in nursing, I think, in nearly every other job."}, {"interview": "IBS (Jan)", "code": "C09", "codeName": "Gender of workers", "quote": "Mostly women with 70 percent of it"}, {"interview": "Diako", "code": "C03", "codeName": "Age of workers", "quote": "We actually have two candidates from Mexico who are already in their early-mid 30s."}, {"interview": "Diako", "code": "C03", "codeName": "Age of workers", "quote": "we are now getting, we‘re in a hot phase now, four young people from Mexico at the end of March"}, {"interview": "Diako", "code": "C03", "codeName": "Age of workers", "quote": "So we for the first time in 2024, participated in the project, and then in August brought four young people from El Salvador to Thuringia that are doing the „Fachkraftausbildung“."}, {"interview": "Diako", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "For example, in one facility in Eisenach, we now have nine different nationalities. Word gets around: India, El Salvador, Syria, Macedonia, so all over the world I always say. And that always works very, very well, they harmonize, they work in the care sector and are very connected with each other and then someone else shows up saying, \"I want to work there too.\" Some of them are even in training to become nursing assistants now. So not just a career change, but they really want to stay and work, so regarding that we had a very good experience."}, {"interview": "Diako", "code": "C04", "codeName": "Informative experience for decision-making", "quote": "Also our trainees from El Salvador—it was agreed then that they would come with B2. But they couldn't finish it because at that time there was a fever outbreak and flooding. So they still came to Germany and did the B2 language course alongside the training and took an exam. Three out of four passed immediately because this B2 exam, I think, is also demanding. So it doesn't have a good reputation, and I was very proud. The other trainee then went to a follow-up course for two more months and then also passed. So there I also said, first a culture shock, plus training, and on top of that learning German. They really did mega—that was always the first, and we took care of everything else."}, {"interview": "Diako", "code": "C07", "codeName": "Importance of language proficiency", "quote": "So we do make sure that someone has at least B1. Because an elderly person is generally hard to understand anyway. And one must speak clearly and loudly, and if one doesn't command the German language reasonably well, it becomes more difficult. And that is again and again really the biggest problem."}, {"interview": "Diako", "code": "C07", "codeName": "Importance of language proficiency", "quote": "And the biggest problem there was also the language. They were not well prepared, some only had B1, which was not sufficient."}], "Pre-Arrival Expectations": [{"interview": "LEG", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "So we go there and show them. We tell them about it—we already tell them about it abroad. We explain it to them, but we also show it to them. What is a vocational school? What is a company? What does the company actually do? What is the relationship between the vocational school and the company? They experience this."}, {"interview": "LEG", "code": "C12", "codeName": "Pre-emptive preferences correction", "quote": "So we go there and show them. We tell them about it—we already tell them about it abroad. We explain it to them, but we also show it to them. What is a vocational school? What is a company? What does the company actually do? What is the relationship between the vocational school and the company? They experience this."}, {"interview": "AWO AJS", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "informational events in digital form beforehand, where we conducted a digital application day or over several hours, where we introduced ourselves as a company. Where both the interested young people could get to know us and we, the other way around, in principle got to know the young people. We exchanged questions, we really worked on many topics on those days, in those workshops."}, {"interview": "AWO AJS", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "We show or discuss beforehand what the mentalities are like, what to pay attention to"}, {"interview": "AWO AJS", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "When we conduct the application interviews, both in Mexico and India or Vietnam, we of course say what awaits the young people and what the difference is. We convey and show with picture material and video sequences the work in a senior care facility. We do that already."}, {"interview": "AWO AJS", "code": "C12", "codeName": "Pre-emptive preferences correction", "quote": "but also the challenging examples of Thuringia. If it is, in principle, also about the individual facilities, which are also not all in large cities or in urban areas at all."}, {"interview": "IBS (Nov)", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "And then they get all the info again. So we always have a little presentation. So we tell them again who we are, we are transparent again about how we are financed. That there are no costs for the people... And then we also show what options there are, meaning where they could do the training. So which locations in Thuringia. We also make it clear that it's rather rural and not everyone can go to Erfurt, because in Erfurt, for example, we haven't placed anyone yet. But really more like Jena and Weimar, for example, but the majority of positions are really in rural areas. We explain that too."}, {"interview": "IBS (Nov)", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "And then we made an FAQ for the application process, for example, that was 23 pages with all possible questions. The scholarship includes language course and language exams, not living costs. And that you can't work on the side because it's a full-time course. Such things were explained there and I think that already cleared up many things."}, {"interview": "IBS (Nov)", "code": "C12", "codeName": "Pre-emptive preferences correction", "quote": "Also, that we currently only place in nursing homes, because often the expectation is hospital, they want to go to a clinic. We dispel that notion relatively early and tell people if you want to go to a hospital, then this isn't the right thing for you. So if you only want to go there, no. We explain what the training involves. So theory and practice, how that works. And also that afterwards they can work in a hospital if they want, as it is a generalist training. So. We explain all that, but also say what the goal is. Well, the goal is that they do the training in the nursing home and can also imagine staying there at first, but of course we also give them the info that they are not obligated to do so."}, {"interview": "IBS (Jan)", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "They can write us an email or make a phone call to our company and ask for support. In terms of this they ask for support for the recognition process. They tell us they are accredited nurses in their country and want to work here in Germany. What do they have to do now, in terms of which documents do they need? Where do they have to contract? What do they have to bring with them? So we give them support in this direction. If they are already in Germany, then we do the same. We tell them you can work as a nursing assistant. We tell them you have to contact Landes for violence and Weimar. And what do they have to do? And so on. And then the application, or after the application, we support them in this theory."}, {"interview": "IBS (Jan)", "code": "C12", "codeName": "Pre-emptive preferences correction", "quote": "The agency advises on how participants deal with their exams because participants expect to just pass the exam by memorizing and receiving the answers from the teacher for the exams. This is not how things work in Germany"}, {"interview": "Diako", "code": "C11", "codeName": "Pre-arrival information provision", "quote": "About housing, wages, how they live, how the training works with school and practice, and so on. And there we can actually alleviate many fears. And the ZAV and the Goethe-Institut also prepare them very well for culture shock. I think for everyone in Mexico, it's also 20° in winter. We must know that it's cold and dark here in winter."}, {"interview": "Diako", "code": "C12", "codeName": "Pre-emptive preferences correction", "quote": "We introduce ourselves as the Diakonie Foundation, or other providers in Thuringia. Then the participants choose: “Okay, I want to go there,” or “I’d rather go to a hospital.” Often, they don’t fully understand the difference—for example, that we are an elderly care facility, not an inpatient hospital."}], "Extended Support": [{"interview": "LEG", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "That was extremely important: language—alongside political education—language. Then came career orientation. Career orientation is a broad field. What we planned, and what we actually implement, is the following: we try to make it clear to young people from Latin America what dual vocational training is. And that is sometimes more difficult than one might think."}, {"interview": "LEG", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "So we accompany them in interactive activities on-site—they join clubs, sports clubs, take salsa or dance classes, and so on. We really support them with integration, both socially and in the workplace, and they also have much more time to engage with companies."}, {"interview": "LEG", "code": "C17", "codeName": "Emphasis of transparency", "quote": "This—this (Interviewee 1)—and the structure, that is a very, very important process in the GPS: first, you have to introduce the participants to the structure that exists in Germany, right? German punctuality, also these cultural differences—there’s a difference if someone comes from Mexico City and then ends up, I don’t know, in Saalfeld, working in a company in a small town. That’s a culture shock at first, and this program is responsible for preparing them for that, and we already start doing that in the home country."}, {"interview": "AWO AJS", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "in the facilities there is a \"caretaker structure\". There are, in principle, mentors, who then jointly, partly already have experience, who accompany the young people on their paths. So the colleagues from personnel development accompany the paths to registration, health insurance, registration at the banks"}, {"interview": "AWO AJS", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "after a certain time there is a workshop, for example, where everyone comes together again, where one meets at a fixed location, where one then jointly, we are there again too, where one then asks how have the first days been? Where are there still problems?"}, {"interview": "AWO AJS", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "There is a guideline, there are agreements, there are training courses for the facilities that take in young people, so to speak, or that take in skilled workers from abroad or trainees there, they also need support there. That it is an increased effort or that there might be something to explain again"}, {"interview": "AWO AJS", "code": "C14", "codeName": "Concern of migrant workers family conditions", "quote": "Family reunification (…) we do that, together with the colleagues of the IBS, which I already mentioned. Basically, it exists. We have already made positive experiences there. Colleagues who came from Vietnam, for example, or from other countries, who later brought their families over. So also that, or who have found families within Thuringia, have started families."}, {"interview": "AWO AJS", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "And of course, it is also important to understand the specifics within the countries of origin, to understand the mentalities, and that one also prepares a good welcome culture and then lives it (…) So, that one doesn't leave the young people alone when they have, in principle, taken this big and important step for them"}, {"interview": "AWO AJS", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "in the facilities there is a \"caretaker structure.\" There are, in principle, mentors, who then jointly, partly already have experience, who accompany the young people on their paths. So the colleagues from personnel development accompany the paths to registration, health insurance, registration at the banks"}, {"interview": "AWO AJS", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "we have an integration program within the AWO Thuringia, that is no longer me personally then, but we have colleagues in the area of personnel development or also in the subdivisions in the local personnel departments, who then are supportively active regarding integration"}, {"interview": "AWO AJS", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "after a certain time there is a workshop, for example, where everyone comes together again, where one meets at a fixed location, where one then jointly, we are there again too, where one then asks how have the first days been? Where are there still problems?"}, {"interview": "AWO AJS", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "Training courses for facilities that take in young people (…) or that one perhaps also says come on, I'll invite you for coffee to my home, that one also gives a piece of family."}, {"interview": "AWO AJS", "code": "C17", "codeName": "Emphasis of transparency", "quote": "AWO also live by certain values of fair recruitment, meaning that we do not want the young people to take on high loans, incur debts, or also involve their families there. We, in principle, cover the corresponding costs there, as the policy also states, so for example in Vietnam, we fully cover the language training"}, {"interview": "IBS (Nov)", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "That's the employer's responsibility, whether they maybe then still finance something language-wise, maybe tutoring or whatever. But that's no longer part of our requirements for the employer. Exactly, and the employer is also responsible for, let's say, providing a person who then also helps with apartment search, so beforehand with apartment search, so that they definitely have an apartment that is furnished when they arrive. The employer also does this package: bank account opening, buying a SIM card, accompanying to authorities, organizing, etc. So we don't want to have to drive everywhere again, but that the employer also shows they are engaged.\nAnd interested, yes. So we are not an accompanying project after entry in that sense. We can't manage that either, personnel-wise. Because they now have people at, I don't know, 5, 6, 7 different locations.\nAll over Thuringia, so we couldn't do authorities visits for 16 people within the first two weeks. But so far that has worked well, that the employer takes care of it, or the various employers. And that also helps the person feel comfortable with the employer, because we are then simply no longer responsible and can't do as much for the people anymore.\nThat's why it's actually a good step to hand it over like that, and so far we really have the feeling it works well. Yes, and we remain as external contacts. So if they want to talk to someone who isn't the employer.\nThen they know they can always come to us"}, {"interview": "IBS (Nov)", "code": "C14", "codeName": "Concern of migrant workers family conditions", "quote": "We have families too, so two, I think we had from last year one who is a mother, then it was about what options. At least to bring the child over at some point. For us it was also important to make clear directly beforehand. It will be very, very difficult to realize that during training. So probably only after training."}, {"interview": "IBS (Nov)", "code": "C14", "codeName": "Concern of migrant workers family conditions", "quote": "We had one person, for example, who asked about a husband, whether we could support with job search, which unfortunately didn't work, which is not our field in the work area. And another, who is currently in the class, for example, just had a child, we don't know yet if she somehow. Wishes to bring the child over, probably yes. At some point, have to wait, but what is important for us is above all to give information that it can take long and that it will be difficult... Expect, so we always advise only in that sense beforehand, that it doesn't go immediately, that there is definitely not this expectation that I enter Germany together with my child and that that will probably only be after training."}, {"interview": "IBS (Nov)", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "Yes, so that and then things like loneliness or that it's a bit too expensive and wanting something cheaper in the long run."}, {"interview": "IBS (Nov)", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "We also have a welcome workshop after, let's see this year, it was after about two weeks, where they also network with the trainees from last year and can ask questions independently from the employer. What are the experiences? What porblems occur?"}, {"interview": "IBS (Nov)", "code": "C17", "codeName": "Emphasis of transparency", "quote": "So that we first give all information from our side. So the people usually contact us via email or we get the contact forwarded from our partners in Vietnam. And then they get all the info again. So we always have a little presentation. So we tell them again who we are, we are transparent again about how we are financed. That there are no costs for the people"}, {"interview": "IBS (Nov)", "code": "C17", "codeName": "Emphasis of transparency", "quote": "So an important point is at least now with the trainees we recruit, the employer pays principle. So that no costs arise for them, so that they are not, for example, indebted when starting training or still in a dependency somehow because of it. But that they can concentrate on this training and the entry relatively worry-free. Then of course transparency, that was clearly communicated. What is this training? What is the remuneration? How long does it take, what are you getting into? What is the activity profile?"}, {"interview": "IBS (Jan)", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "And what we do is we support them during their process of recognition or accreditation. I don't know the exact English word, and we support them. So we do a course where they learn theory, nursing theory, we do practical exercises, and we prepare them for the exam."}, {"interview": "IBS (Jan)", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "They can write us an email or make a phone call to our company and ask for support. In terms of this they ask for support for the recognition process. They tell us they are accredited nurses in their country and want to work here in Germany. What do they have to do now, in terms of which documents do they need? Where do they have to contract? What do they have to bring with them? So we give them support in this direction. If they are already in Germany, then we do the same. We tell them you can work as a nursing assistant...And what do they have to do? And so on. And then the application, or after the application, we support them in this theory."}, {"interview": "IBS (Jan)", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "So during class, we explain to them everything concerning Germany. So which insurances are there in Germany, which insurances are necessary, which are recommended, and which do you actually not need? Things like that and if they have any questions, they can always ask us."}, {"interview": "IBS (Jan)", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "And if the participant says the employer is bad or I get mistreated, we can support them and just change the employer. This happens sometimes, not often. But if it's in the interest of the participant, then, yeah, why not?"}, {"interview": "IBS (Jan)", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "One example is a lot of participants live in a flat from their job provided the job providers, the job provider and sometimes the job provider just walks into their flat and looks around and they tell me that during class, and I tell them that's not allowed in Germany, the job provider isn't allowed to just come into your flat and inspect everything that's this is an example."}, {"interview": "IBS (Jan)", "code": "C14", "codeName": "Concern of migrant workers family conditions", "quote": "Also, we can help in this process, but this is another part of the IBS in theory. We can do that, but I'm not very knowledgeable, but knowledgeable in these aspects, and more in the aspect of nursing. My boss knows a lot about this, and she always says, usually it works via the employer. So the employer takes care of that. They contact the ministries or the Auslanderbehorde and they do that."}, {"interview": "IBS (Jan)", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "If the participant says the employer is bad or they are mistreating them, we can support them and just change the employer. This happens sometimes, not often. But if it's in the interest of the participant, then, yes we support them from being isolated and not comfortable at their work place"}, {"interview": "Diako", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "They also wanted to network, or they wanted a bicycle—I then organized that via eBay classifieds—such small things."}, {"interview": "Diako", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "Regarding training, they have an apartment. So we must confirm that their livelihood is secure and such things. But all that bureaucracy in the country—we have little to do with the embassies; that's also... I am very grateful for that. I believe everything else... And then you mentioned that after arrival you also help with apartment search and possible matters. Exactly, how does integration support look otherwise, if you are further involved? Background problems. And expired visas around the corner—that is very effortful, but we do it. We do it gladly. So we definitely picked them up from the airport. We are currently in the fortunate position that in our facility itself, we have small apartments and shared flats. Previously it was like age-appropriate flooring, but that doesn't exist anymore, and then my colleague said we need apartments for all people coming; they have to live somewhere. So directly with us, at least for the duration of the training, at minimum."}, {"interview": "Diako", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "We are still considering appointing an integration officer."}, {"interview": "Diako", "code": "C10", "codeName": "Proactive assistance from agencies", "quote": "We’re planning Azubi days, then it‘s about all the registrations to the Thuringian State Administration Office with this generalist nursing training."}, {"interview": "Diako", "code": "C14", "codeName": "Concern of migrant workers family conditions", "quote": "We actually have two candidates from Mexico who are already in their early-mid 30s. My colleague then asked the question: Is there family, children? Well, that would all be quite hindering. They have to completely give up their life in their home country. So they consciously want to come here because they have no opportunity there. And yes, it's just a bit of sympathy too, perhaps a bit."}, {"interview": "Diako", "code": "C14", "codeName": "Concern of migrant workers family conditions", "quote": "What are the criteria or prerequisites to be selected? We look a bit at the family background."}, {"interview": "Diako", "code": "C16", "codeName": "Concern of social isolation of migrant workers", "quote": "Otherwise, as said, we currently only have El Salvador and then consciously decided on Mexico due to the native language, because our trainees from El Salvador are already here.Then they are our helpers for those who come. We thought, because the language is similar in that region, we said we'll first stay with Spanish-speaking countries."}], "Adverse Outcomes": [{"interview": "LEG", "code": "C06", "codeName": "Resignation of careworkers", "quote": "That means if someone, after political education, says, “This is not for me, I can’t do it, I can’t imagine it,” that’s fine. Because after political education, we are supposed to know what’s coming. Nothing is sugar-coated—this is preparation. And it can happen that someone drops out, but in the last group, that didn’t happen, right? Because these are highly motivated people—they really want to take advantage of this program."}, {"interview": "LEG", "code": "C08", "codeName": "Description of xenophobia", "quote": "So we address that—why in the first cohort, because I’m responsible for the content, for example, when it comes to topics like discrimination and so on.\nWe also did role-plays directly, yes, because… in Thuringia, if you go in a certain direction, you might meet someone from the AfD. So, what do you do? They can walk past you, or they might address you rudely, right?\nHow do you react? How do you prepare for that? Or some have problems with women, right? Suddenly, you’re confronted rudely. How do you respond?"}, {"interview": "LEG", "code": "C08", "codeName": "Description of xenophobia", "quote": "We still try to be neutral. So when you present the party system, you want to maintain neutrality, right? But you still prepare people for the countryside, where it might happen—even in the city. You’re no longer protected anywhere; it’s possible that someone is there who doesn’t like the way you look."}, {"interview": "LEG", "code": "C08", "codeName": "Description of xenophobia", "quote": "Whether they’re from the AfD or from… I don’t know, some other party—it doesn’t really matter—but participants are definitely prepared for that. Yes—you have to be. (Interviewee 1) One of the staff members, from the last cohort of South Americans, worked with us, and it was great to have his insight. Even he said that this is one of the first questions participants ask: how racism works here in Germany."}, {"interview": "LEG", "code": "C08", "codeName": "Description of xenophobia", "quote": "We really shouldn’t underestimate that. In Brazil, at a congress with German language teachers, there were 2,000 people, and the question came up: “Can you explain Germany to us again, the country of the AfD?” That’s what’s in people’s minds."}, {"interview": "LEG", "code": "C08", "codeName": "Description of xenophobia", "quote": "but our media also contributes to this to some extent. They report in such a way that abroad it seems like you only ever hear about the AfD, and then the question comes: “What are you doing about the AfD? The AfD is everywhere in your country.” Well, that’s not really the case.\nBut that’s how it is—we have to prepare for it. And the young people come here with a certain fear—they think, “We’ll be attacked here, and so on. There’s someone hiding behind every tree with a club, all the way to the AfD.”"}, {"interview": "AWO AJS", "code": "C06", "codeName": "Resignation of careworkers", "quote": "But if that can't resolve it, then unfortunately there are young people who move away—either within Thuringia because Erfurt or Jena has a different community, or to other federal states where there is a larger community. That's just how it is."}, {"interview": "AWO AJS", "code": "C08", "codeName": "Description of xenophobia", "quote": "That's a result, showing Thuringia puts much energy and effort into being a friendly state, with only a small part of people being less friendly to others."}, {"interview": "AWO AJS", "code": "C08", "codeName": "Description of xenophobia", "quote": "It's too difficult for the young person, yes, if they practically, during the indeed very, yes, intensive and also challenging training in the generalist training to become a nursing specialist, also still have to take care of the B2 language training, which is then really very intensive, and have to put a lot of energy into it, we want to avoid that and therefore we think it's good and set a condition - entry with B2 level"}, {"interview": "AWO AJS", "code": "C08", "codeName": "Description of xenophobia", "quote": "We always say, for example, a nursing professional from Vietnam or India or from another country of origin, it is good if they work in a senior care facility (compared to a hospital) because for the competence to improve the language and to learn and understand the language, it is beneficial in a job in a senior care facility – there one speaks slowly, yes, there one also gets feedback slowly. Of course one might also have various language qualities or dialects there."}, {"interview": "AWO AJS", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "Because, let me say, homesickness, is quite clear, it comes at some point. And for one sooner than for the other perhaps. That also has something to do with the maturity of the person, with personal development, with age."}, {"interview": "AWO AJS", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "(…) cannot go there because they perhaps just have a problem with the colleague there"}, {"interview": "AWO AJS", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "And when then the young people come and see, let me say, municipalities, communities that, let me say, do not have certain infrastructures as the young people are perhaps used to or were used to. Then or then a topic could arise or will arise, that they are dissatisfied"}, {"interview": "AWO AJS", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "there are facilities in smaller communities, where in principle certain infrastructures are less available or not available at all, but we also have to cover our needs there. That is then already a challenge for the employer, but also for the young person, or for the skilled worker or the prospective skilled worker from abroad, to feel comfortable there (…) One simply has to say that, and then the young people want, understandably, that is no different with our own children, then they of course want to go to the big cities."}, {"interview": "AWO AJS", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "it is certainly a very high effort at the beginning and requires a lot of time. But in the end or in the middle of the time, it shows that that is good"}, {"interview": "IBS (Nov)", "code": "C06", "codeName": "Resignation of careworkers", "quote": "And it takes two years, then there are cases where someone, well, drops out...then two canceled directly before it started. They said, no, that's not what I want right now. They get their language course completely financed, but have to move for it. If they already lived somewhere.\nSo some say that's financially not feasible. Because they also can't work on the side, as it's a full-time course. Or because they realized German is not their language, and then it becomes very difficult. Exactly, one person quit because of that, because of, I can't do this with learning German so far.\nAnd the others, they were all just personal reasons. I think they didn't specify. Yes, so I think with the two or three other people who quit, one person said she couldn't afford to live there. And the other person had family, personal, health reasons."}, {"interview": "IBS (Nov)", "code": "C06", "codeName": "Resignation of careworkers", "quote": "In Weimar, I can imagine quite well that they also want to stay there at first, at the employer. I don't know, it depends, maybe on what other options they get. I don't think they'll leave immediately. Definitely as a skilled worker then, yes. But I think it's a bit more likely that they will then orient themselves elsewhere at some point. But also not that they immediately, I don't know, finish training and then pack their bags, I don't really believe that. That in Thuringia there are relatively many Vietnamese, so a community. That is already there somehow. Also of older people, so who aren't maybe 20 or so. But also, and that it's now slowly building up a bit, even if it's only 20 people at first. But if already two are doing training in the same home or same place. And then next year another two come, then the cohesion is also a bit bigger."}, {"interview": "IBS (Nov)", "code": "C08", "codeName": "Description of xenophobia", "quote": "Or also regarding the state, one sometimes has. Yes, fear of potential discrimination experiences or such... But regarding discrimination experiences, we haven't gotten any feedback at least.\nBut I also don't think they'll come to us for every little thing, maybe only if it's something drastic and they don't know how to deal with it. But nothing has been brought to us so far."}, {"interview": "IBS (Nov)", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "it's super tiring, I'm tired. The vocational school, the eight medical terms, it's so hard, yes, and problems with the language for sure. That's very, very difficult, following vocational school especially. I think at work most manage better. Because you perhaps also try harder there? But in school, the teachers talk ultra-fast, partly with dialect, and of course don't make allowances. So they always say, you can ask if something is unclear. But you don't want to ask every 2 minutes, you can't ask about every sentence if you don't understand a word. Yes, so I think language is the biggest problem."}, {"interview": "IBS (Jan)", "code": "C06", "codeName": "Resignation of careworkers", "quote": "And most of the people actually stay in Thuringia. But most of the people I know, and I've stayed here at this company for two years, most of the people I know stayed here in Thuringia, but it's a company, those people that do change the federal state, they changed either to Bavaria or to the west yeah, because, the Western Germany, because they know money is a bit better. The towns are bigger, the cities are bigger, more money, yeah, or because their family lives there, a couple of participants in courses at the moment are telling me that they will change to this if I think because a lot of their family works there, or they know a lot of people there."}, {"interview": "IBS (Jan)", "code": "C08", "codeName": "Description of xenophobia", "quote": "We have to show the people at IBS that they are knowledgeable in terms of the law. So if there are extreme cases or cases of discrimination, we can ask them for help. But smaller cases of discrimination, we'll just try to find out what happened. What did the people say? And we can talk to the employer or the job giver, or we can talk to not the highest, not the employer themselves, but maybe a little bit lower, maybe to the colleague themselves. That said, yeah, so we can, we can support them, and we do support them in every case of if there are problems, if they get discriminated, if they have to do tasks that are not acceptable, if they get insulted, or things like that, we support them because it's quite normal, actually, and if there are extreme cases, we talk to our colleagues that are specialized, specialized in this field, and do know what to do."}, {"interview": "IBS (Jan)", "code": "C08", "codeName": "Description of xenophobia", "quote": "And why are German people so unfriendly? This is what I hear a lot."}, {"interview": "IBS (Jan)", "code": "C18", "codeName": "Report of exogenous negative migrant worker experience", "quote": "One example is a lot of participants live in a flat from their job provided the job providers, the job provider and sometimes the job provider just walks into their flat and looks around and they tell me that during class, and I tell them that's not allowed in Germany, the job provider isn't allowed to just come into your flat and inspect everything that's this is an example. Other examples are language problems, or a big, a huge problem is the differences between the federal states. So in a couple of federal states, for instance, Bavaria, the participants would get a full recognition of everything, so they don't have to do a course, they don't have to do an exam, but in Thuringia they have to do everything, and they don't really understand why. We don't, too that's a problem. Other problems are stressful because of a lot of theory. They have to learn a lot, they have to come to our class, and they have to do work the other day. So there's a lot of stress."}, {"interview": "Diako", "code": "C06", "codeName": "Resignation of careworkers", "quote": "We also had a young... very committed, really sweet girl, and she started nursing assistant training, but she also had B1. But she just doesn't manage linguistically, and she has now dropped out. She is still working with us. But we have to see how it goes on because she is also here under the premise of the training."}, {"interview": "Diako", "code": "C08", "codeName": "Description of xenophobia", "quote": "But fundamentally, I would say the elderly people take it well. I haven't had any grave incidents yet.So there is also someone in one old nursing home—she has completely black skin. But she is a skilled worker, but that runs super, I must say. Very old people who still remember the Second World War—then one sometimes thinks, oh, but no—so far it runs super."}, {"interview": "Diako", "code": "C08", "codeName": "Description of xenophobia", "quote": "In East Germany, then this one political direction always... Whether that gets around, I don't know. That would be a shame. Experiences with, or possibly with this city-country. That they were still satisfied in more rural regions."}], "Qualification Mismatches": [{"interview": "LEG", "code": "C15", "codeName": "Perceived discrepancy of qualification quality", "quote": "This has nothing to do with me telling them what a dual vocational training program is. I can tell them anything. It’s about understanding. I—because this dual vocational training doesn’t exist in the career structures and career orientation abroad—find it very difficult to really grasp what the Germans are actually doing here. So, how does this dual vocational training actually work here?"}, {"interview": "AWO AJS", "code": "C15", "codeName": "Perceived discrepancy of qualification quality", "quote": "But certain recognition procedures are needed—certain modules or practical internships in hospitals and senior care facilities because geriatrics or practical geriatric/elderly care is not taught or practiced in Vietnam (similar to India)"}, {"interview": "AWO AJS", "code": "C15", "codeName": "Perceived discrepancy of qualification quality", "quote": "there is a certain procedure that one must go through, with the State Administration Office, the recognition procedure or the equivalence assessment, those are two different building blocks."}, {"interview": "AWO AJS", "code": "C15", "codeName": "Perceived discrepancy of qualification quality", "quote": "Vietnam now, there are various training forms. So there is, in principle, the college training there.\nThat is a three-year training, which is not comparable to the three-year generalist training in Germany, that would then rather be the care worker, the non-examined one. And the study, so the four-year training in Vietnam, that is then rather the three-year training in Germany"}, {"interview": "IBS (Nov)", "code": "C15", "codeName": "Perceived discrepancy of qualification quality", "quote": "We check the certificates beforehand and know which diplomas get recognized. That’s why we haven't had any problems yet, but there is sometimes the alternative that you only prove ten years of schooling. So it then depends on the employer     const themeOrder = ["Transnational Recruitment", "Worker Suitability", "Pre-Arrival Expectations", "Extended Support", "Adverse Outcomes", "Qualification Mismatches"];
    const themeIds = themeOrder.map(t => t.replace(/\s+/g,'-').toLowerCase());

    function render() {
      const search = (document.getElementById('search').value || '').toLowerCase();
      const interviewFilter = document.getElementById('interview-filter').value;

      // Tabs
      const tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = themeOrder.map((theme, i) => {
        const quotes = data[theme] || [];
        const filtered = quotes.filter(q =>
          (!interviewFilter || q.interview === interviewFilter) &&
          (!search || q.quote.toLowerCase().includes(search) || q.codeName.toLowerCase().includes(search))
        );
        return `<button class="tab ${i===0?'active':''}" data-theme="${themeIds[i]}">${theme} (${filtered.length})</button>`;
      }).join('');

      // Panels
      const panelsEl = document.getElementById('panels');
      panelsEl.innerHTML = themeOrder.map((theme, i) => {
        const quotes = data[theme] || [];
        const filtered = quotes.filter(q =>
          (!interviewFilter || q.interview === interviewFilter) &&
          (!search || q.quote.toLowerCase().includes(search) || q.codeName.toLowerCase().includes(search))
        );
        const cards = filtered.map(q => `
          <div class="quote-card" data-quote="${q.quote.replace(/"/g,'&quot;').substring(0,50)}">
            <div class="meta">
              <span class="interview">${escapeHtml(q.interview)}</span>
              <span class="code">${escapeHtml(q.code)} · ${escapeHtml(q.codeName)}</span>
            </div>
            <div class="quote-text">${escapeHtml(q.quote)}</div>
            <button class="copy-btn" onclick="copyQuote(this)">Copy</button>
          </div>
        `).join('');
        return `<div class="tab-panel ${i===0?'active':''}" id="panel-${themeIds[i]}">${cards.length ? cards : '<p class="count">No quotations match your filters.</p>'}</div>`;
      }).join('');

      // Tab click
      tabsEl.querySelectorAll('.tab').forEach((tab, i) => {
        tab.onclick = () => {
          tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          panelsEl.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById('panel-'+themeIds[i]).classList.add('active');
        };
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function copyQuote(btn) {
      const card = btn.closest('.quote-card');
      const text = card.querySelector('.quote-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
      });
    }

    document.getElementById('search').oninput = document.getElementById('interview-filter').onchange = render;
    render();
  </script>
</body>
</html>
