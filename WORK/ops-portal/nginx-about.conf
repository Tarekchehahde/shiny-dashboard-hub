# nginx snippet for personal About/CV page (add to mastr-hub site)

location = /cv { return 301 /about/; }
location = /about { return 301 /about/; }
location /about/ {
    alias /var/www/mastr-portal/about/;
    index index.html;
}

# Deploy: scp -r WORK/ops-portal/* ionos-mastr:/var/www/mastr-portal/
