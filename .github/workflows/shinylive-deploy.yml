name: mastr-shinylive-deploy

# Builds the WebAssembly Shiny site and publishes it to GitHub Pages.
#
# Manual-only (workflow_dispatch). Enable Pages in repo settings and pick
# "GitHub Actions" as the source the first time you run this.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: WORK/shiny
          extra-packages: any::shinylive, any::shiny, any::bslib

      - name: Build shinylive site
        run: Rscript -e 'shinylive::export("WORK/shiny", "_site", subdir = "apps")'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
